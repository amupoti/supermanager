spring.main.allow-bean-definition-overriding=true
logging.level.root=INFO

# Cache
spring.cache.type=caffeine

# ACB API URLs
acb.url.signin=https://id.acb.com/api/signIn
acb.url.token=https://supermanager.acb.com/oauth/V2/open/accounttoken/getTokens
acb.url.teams=https://supermanager.acb.com/api/basic/userteam/all
acb.url.market=https://supermanager.acb.com/api/basic/player?_filters={fields}&_page=1&_perPage=30

# RDM scraper URLs
rdm.url.main=https://www.rincondelmanager.com/smgr/
rdm.url.team=https://www.rincondelmanager.com/smgr/equipo.php?eq=%s

# HTTP timeouts (milliseconds)
http.connect-timeout-ms=30000
http.request-timeout-ms=30000
http.socket-timeout-ms=60000

# RDM politeness: minimum milliseconds between consecutive HTTP requests
rdm.fetch-interval-ms=500

# Background RDM cache refresh interval (milliseconds) — default 1 hour
scraping.rdm.refresh-interval-ms=3600000

# How many upcoming matches to show per player
scraping.next-matches=5

# Private league team names (comma-separated, no duplicates)
private.league.teams=Rianxeira,EL PAS ZERO,Xeiks,Arm\u00f3nicos,EL POLLO HEMBRA,Laso Vuelve,Ga\u00f1an secreto,Drazem Team,Bird Team,Averiaos,CB RAJADELL BANC,Alta Segarra Negre,Bo\u00ed 10,Circulo de quintas,M\u00e8dol 0,Mateo Vete,Mu\u00ed\u00f1eira,Roll for the ga\u00f1an,Xav Solo,Xavi one Kenobi,Faemino,Cansado,Delta 2
